<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; height: 100vh; background: #050505; color: #00f2ff; font-family: monospace;
               display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #dashboard { text-align: center; border: 1px solid #00f2ff; padding: 50px; }
        button { background: transparent; color: #00f2ff; border: 1px solid #00f2ff; padding: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="dashboard">
        <h1 id="status">ARCHIVE STANDBY</h1>
        <button onclick="initialize()">INITIALIZE SYSTEM</button>
    </div>
    <div id="ticker" style="margin-top: 20px;"> >> READY FOR INPUT... >> </div>

    <script>
        function initialize() {
            // Add a "random" number to the end of the URL to force the browser to ignore the cache
const now = new Date();
const dateStr = now.toLocaleDateString('en-GB'); 
const timeStr = now.toLocaleTimeString('en-GB', { hour12: false });
console.log("Current Date Detected: " + dateStr); // This helps us debug
            
            document.getElementById('status').innerText = "SYSTEM ACTIVE";
            document.getElementById('ticker').innerText = " >> DATE: " + dateStr + " | TIME: " + timeStr + " >> ";
            
            const msg = new SpeechSynthesisUtterance("System active. Today is " + dateStr);
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
