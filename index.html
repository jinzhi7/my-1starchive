<script>
    // 1. This runs the second the page loads
    window.onload = function() {
        const now = new Date();
        const dateStr = String(now.getDate()).padStart(2, '0') + "/" + 
                        String(now.getMonth() + 1).padStart(2, '0') + "/" + 
                        now.getFullYear();
        
        // This updates the ticker immediately
        document.getElementById('ticker').innerText = " >> SYSTEM READY. DATE: " + dateStr + " >> ";
    };

    // 2. This keeps the button functionality for your voice effect
    function initialize() {
        document.getElementById('status').innerText = "SYSTEM ACTIVE";
        const now = new Date();
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = now.getFullYear();
        const dateStr = day + "/" + month + "/" + year;
        const timeStr = now.toLocaleTimeString('en-GB');

        const message = "Access granted. Today is " + dateStr + ". The time is " + timeStr + ". All systems nominal.";
        document.getElementById('ticker').innerText = " >> " + message + " >> ";
        
        const msg = new SpeechSynthesisUtterance(message);
        window.speechSynthesis.speak(msg);
    }
</script>
