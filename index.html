<script>
    function updateDashboard() {
        const now = new Date();
        
        // 1. Force DD/MM/YYYY format
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = now.getFullYear();
        const dateStr = `${day}/${month}/${year}`;
        
        // 2. Force HH:MM:SS format (24-hour)
        const timeStr = now.toLocaleTimeString('en-GB', { hour12: false });
        
        // 3. Update the display
        const message = "Access granted. Today is " + dateStr + ". The time is " + timeStr + ". All systems nominal.";
        document.getElementById('ticker').innerText = " >> " + message + " >> ";
    }

    // Run once immediately when page loads
    updateDashboard();

    // Triggered by your button
    function initialize() {
        document.getElementById('status').innerText = "SYSTEM ACTIVE";
        updateDashboard(); // Refresh date/time when button is clicked
        
        const tickerText = document.getElementById('ticker').innerText;
        const msg = new SpeechSynthesisUtterance(tickerText);
        window.speechSynthesis.speak(msg);
    }
</script>
